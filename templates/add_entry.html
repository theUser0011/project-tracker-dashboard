{% extends "base.html" %}

{% block content %}

<div class="card p-4 bg-secondary">
    <h4>Add Entry</h4>

    <form method="POST">

        <label>Date</label>
        <input type="date" name="date" id="dateInput" class="form-control" required>

        <!-- TYPE -->
        <label class="mt-2">Type</label>
        <select name="type" class="form-control" id="typeSelect">
            <option value="food">Food</option>
            <option value="expense">Expense</option>
            <option value="other">Other</option>
        </select>

        <!-- Custom TYPE -->
        <input type="text" name="type_custom" id="typeCustom"
               class="form-control mt-2"
               placeholder="Enter custom type"
               style="display:none;">

        <label class="mt-2">Item Name</label>
        <input type="text" name="name" class="form-control" required>

        <!-- FOOD -->
        <div id="foodFields">
            <label class="mt-2">Health Type</label>
            <select name="health" class="form-control" id="healthSelect">
                <option value="healthy">Healthy</option>
                <option value="junk">Junk</option>
                <option value="other">Other</option>
            </select>

            <input type="text" name="health_custom" id="healthCustom"
                   class="form-control mt-2"
                   placeholder="Enter custom health type"
                   style="display:none;">
        </div>

        <!-- EXPENSE -->
        <div id="expenseFields" style="display:none;">
            <label class="mt-2">Category</label>
            <select name="category" class="form-control" id="categorySelect">
                <option value="daily">Daily Expense</option>
                <option value="petrol">Petrol</option>
                <option value="maintenance">Maintenance</option>
                <option value="other">Other</option>
            </select>
 
            <input type="text" name="category_custom" id="categoryCustom"
                   class="form-control mt-2"
                   placeholder="Enter custom category"
                   style="display:none;">
        </div>

        <label class="mt-2">Price (₹)</label>
        <input type="number" name="price" class="form-control" required>

        <button class="btn btn-success mt-3">Save</button>

    </form>
</div>

<script>
// Set today's date as default (only if empty)
document.addEventListener("DOMContentLoaded", function () {
    const dateInput = document.getElementById("dateInput");

    if (!dateInput.value) {
        const today = new Date();
        const formattedDate = today.toISOString().split('T')[0];
        dateInput.value = formattedDate;
    }
});

// TYPE toggle (main logic)
document.getElementById("typeSelect").addEventListener("change", function() {

    // Show custom type input
    document.getElementById("typeCustom").style.display =
        this.value === "other" ? "block" : "none";

    // Show food/expense sections only for default types
    if (this.value === "food") {
        document.getElementById("foodFields").style.display = "block";
        document.getElementById("expenseFields").style.display = "none";
    } else if (this.value === "expense") {
        document.getElementById("foodFields").style.display = "none";
        document.getElementById("expenseFields").style.display = "block";
    } else {
        // For custom type → hide both
        document.getElementById("foodFields").style.display = "none";
        document.getElementById("expenseFields").style.display = "none";
    }
});

// Health "Other"
document.getElementById("healthSelect").addEventListener("change", function() {
    document.getElementById("healthCustom").style.display =
        this.value === "other" ? "block" : "none";
});

// Category "Other"
document.getElementById("categorySelect").addEventListener("change", function() {
    document.getElementById("categoryCustom").style.display =
        this.value === "other" ? "block" : "none";
});
</script>

{% endblock %}
